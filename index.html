<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kellys Phanatic 30 - MultiApp</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            font-size: 1.4rem;
            margin-bottom: 5px;
            color: #4CAF50;
            text-align: center;
        }

        /* Navigációs menü a lapok között */
        .nav-tabs {
            display: flex;
            width: 100%;
            max-width: 350px;
            background-color: #1e1e1e;
            border-radius: 10px;
            padding: 5px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: #aaa;
            padding: 10px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
            box-shadow: none !important;
        }

        .tab-btn.active-tab {
            background-color: #4CAF50;
            color: black;
        }

        /* Lapok láthatósága */
        .app-page {
            display: none;
            width: 100%;
            max-width: 350px;
            flex-direction: column;
            align-items: center;
        }

        .app-page.active-page {
            display: flex;
        }

        /* Közös kijelző doboz stílus */
        .display-container {
            background-color: #1e1e1e;
            border-radius: 15px;
            padding: 25px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
        }

        .main-value {
            font-size: 4.5rem;
            font-weight: bold;
            color: #4CAF50;
            margin: 10px 0;
        }

        .sub-value {
            font-size: 1.2rem;
            color: #00bcd4;
        }

        .section-title {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 10px;
            align-self: flex-start;
            width: 100%;
        }

        /* Gombcsoportok a váltóhoz */
        .btn-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            margin-bottom: 20px;
        }

        .gear-btn {
            background-color: #2a2a2a;
            color: white;
            border: 2px solid #444;
            padding: 12px 5px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .gear-btn.active {
            background-color: #4CAF50;
            border-color: #4CAF50;
            color: black;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }

        /* Gyorsulásmérő specifikus stílusok */
        .sensor-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            margin-top: 10px;
        }

        .sensor-box {
            background-color: #2a2a2a;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #444;
        }

        .sensor-num {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff9800;
            margin-top: 5px;
        }

        .action-btn {
            background-color: #ff9800;
            color: black;
            border: none;
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
        }

        .status-text {
            font-size: 0.85rem;
            color: #ff9800;
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>

<body>

    <h1>Kellys Phanatic 30</h1>

    <!-- Navigáció -->
    <div class="nav-tabs">
        <button class="tab-btn active-tab" onclick="switchTab('cadence-page', this)">Kadencia (GPS)</button>
        <button class="tab-btn" onclick="switchTab('sensor-page', this)">Gyorsulásmérő</button>
    </div>

    <!-- 1. OLDAL: KADENCIA MÉRŐ -->
    <div id="cadence-page" class="app-page active-page">
        <div class="display-container">
            <div class="label">Pedálfordulat</div>
            <div id="rpm-value" class="main-value">--</div>
            <div id="speed-value" class="sub-value">Sebesség: 0.0 km/h</div>
            <div id="gps-status" class="status-text">Keresem a GPS jelet...</div>
        </div>

        <div class="section-title">NAGYTÁNYÉR (48T) FOKOZATOK:</div>
        <div class="btn-group">
            <button class="gear-btn" onclick="setGear(48, 19, this)">48x5</button>
            <button class="gear-btn active" onclick="setGear(48, 17, this)">48x6</button>
            <button class="gear-btn" onclick="setGear(48, 15, this)">48x7</button>
        </div>

        <div class="section-title">KÖZÉPSŐ TÁNYÉR (36T) FOKOZATOK:</div>
        <div class="btn-group">
            <button class="gear-btn" onclick="setGear(36, 15, this)">36x7</button>
            <button class="gear-btn" onclick="setGear(36, 13, this)">36x8</button>
            <button class="gear-btn" onclick="setGear(36, 11, this)">36x9</button>
        </div>
    </div>

    <!-- 2. OLDAL: GYORSULÁSMÉRŐ TESZT -->
    <div id="sensor-page" class="app-page">
        <button class="action-btn" onclick="startSensors()">Szenzorok engedélyezése</button>

        <div class="display-container">
            <div class="label">Aktuális dőlésszög</div>
            <div id="tilt-value" class="main-value">0°</div>
            <div id="sensor-status" class="status-text">Kattints a fenti gombra az indításhoz!</div>

            <div class="sensor-grid">
                <div class="sensor-box">
                    <div class="label">X tengely (Oldal)</div>
                    <div id="acc-x" class="sensor-num">0.00</div>
                </div>
                <div class="sensor-box">
                    <div class="label">Y tengely (Előre)</div>
                    <div id="acc-y" class="sensor-num">0.00</div>
                </div>
                <div class="sensor-box">
                    <div class="label">Z tengely (Függ.)</div>
                    <div id="acc-z" class="sensor-num">0.00</div>
                </div>
                <div class="sensor-box">
                    <div class="label">Össz. erő (G)</div>
                    <div id="acc-g" class="sensor-num">0.00</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- LAPVÁLTÓ LOGIKA ---
        function switchTab(pageId, element) {
            document.querySelectorAll('.app-page').forEach(page => page.classList.remove('active-page'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active-tab'));

            document.getElementById(pageId).classList.add('active-page');
            element.classList.add('active-tab');
        }

        // --- KADENCIA (GPS) LOGIKA ---
        const WHEEL_CIRCUMFERENCE = 2200; // 700x40C gumi mm-ben
        let frontTeeth = 48;
        let rearTeeth = 17;
        let currentSpeedKmh = 0;

        function setGear(front, rear, element) {
            frontTeeth = front;
            rearTeeth = rear;
            document.querySelectorAll('.gear-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            updateCadenceDisplay();
        }

        function updateCadenceDisplay() {
            if (currentSpeedKmh <= 1) {
                document.getElementById('rpm-value').innerText = "--";
                document.getElementById('speed-value').innerText = `Sebesség: ${currentSpeedKmh.toFixed(1)} km/h`;
                return;
            }
            const gearRatio = frontTeeth / rearTeeth;
            const rpm = (currentSpeedKmh * 16666.67) / (WHEEL_CIRCUMFERENCE * gearRatio);
            document.getElementById('rpm-value').innerText = Math.round(rpm);
            document.getElementById('speed-value').innerText = `Sebesség: ${currentSpeedKmh.toFixed(1)} km/h`;
        }

        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(
                function (position) {
                    let speedMs = position.coords.speed;
                    if (speedMs !== null && speedMs !== undefined) {
                        currentSpeedKmh = speedMs * 3.6;
                        document.getElementById('gps-status').innerText = "GPS kapcsolat aktív ✔";
                        document.getElementById('gps-status').style.color = "#4CAF50";
                    } else {
                        document.getElementById('gps-status').innerText = "Mozogj a bringával a méréshez!";
                        document.getElementById('gps-status').style.color = "#ff9800";
                        currentSpeedKmh = 0;
                    }
                    updateCadenceDisplay();
                },
                function (error) {
                    const statusDiv = document.getElementById('gps-status');
                    statusDiv.style.color = "#f44336"; statusDiv.innerText = error.code === 1 ? "Engedélyezd a GPS-t!" : "GPS jel hiba.";
                }, { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 });
        }// --- GYORSULÁSMÉRŐ (ACCELEROMETER) LOGIKA ---
        function startSensors() {
            // Ellenőrizzük, hogy iOS eszközről van-e szó, mert ott külön ablakos engedélykérés kell
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(permissionState => {
                    if (permissionState === 'granted') {
                        activateMotionListener();

                    } else {
                        document.getElementById('sensor-status').innerText = "Megtagadott szenzor hozzáférés.";
                        document.getElementById('sensor-status').style.color = "#f44336";
                    }
                }).catch(console.error);
            } else {// Android vagy asztali böngésző esetén közvetlenül indulhat
                activateMotionListener();
            }
        } function activateMotionListener() {
            window.addEventListener('devicemotion', function (event) {// Gravitációval növelt gyorsulási adatok lekérése (m/s²)
                let x = event.accelerationIncludingGravity.x || 0; let y = event.accelerationIncludingGravity.y || 0; let z = event.accelerationIncludingGravity.z || 0;// Ha a telefon fejjel lefelé vagy tükrözve van, néhány rendszer előjelet vált, finomítunk rajta vizuálisan
                document.getElementById('acc-x').innerText = x.toFixed(2); document.getElementById('acc-y').innerText = y.toFixed(2); document.getElementById('acc-z').innerText = z.toFixed(2);// Kiszámoljuk az eredő gyorsulást (vektoriális összegzés)
                let totalG = Math.sqrt(xx + yy + z * z) / 9.81; // Átváltás G egységbe
                document.getElementById('acc-g').innerText = totalG.toFixed(2) + " G";// Egyszerűsített dőlésszög számítás (Y és Z tengely alapján, fokban)// Azt méri, hogy a kormányon lévő telefon mennyire dől előre/hátra
                let tiltRad = Math.atan2(y, z); let tiltDeg = tiltRad * (180 / Math.PI);// Korrigáljuk, hogy ha függőlegesen áll a kormányon, akkor legyen kb 0 fok
                let normalizedTilt = Math.round(tiltDeg); document.getElementById('tilt-value').innerText = normalizedTilt + "°"; document.getElementById('sensor-status').innerText = "Szenzorok aktívak ✔"; document.getElementById('sensor-status').style.color = "#4CAF50";
            }, true);
        }
